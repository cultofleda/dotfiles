[colors]
background = #ee1a1b26
background-alt = #dd32344a
foreground = #a9b1d6
primary = #449dab
secondary = #7aa2f7
tertiary = #ad8ee6
alert = #f7768e
disabled = #32344a

[bar/example]
background = ${colors.background}
border-bottom-size = 0
border-color = #00ffffff
border-size = 0
cursor-click = pointer
cursor-scroll = ns-resize
dpi = 96
enable-ipc = true
font-0 = "Iosevka Custom:pixelsize=9;2"
foreground = ${colors.foreground}
height = 30pt
module-margin = 2 
modules-center = xwindow
modules-left = launcher xworkspaces 
modules-right = spotify previous playpause next pulseaudio filesystem memory cpu wlan battery date 
monitor = ${env:MONITOR:}
padding-left = 0
padding-right = 2.8
radius = 0
separator = ""
separator-foreground = ${colors.background-alt}
tray-position = right 
width = 100%

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/launcher]
type = custom/text
click-left = "rofi -show drun"
content = "ůį£á "
content-padding = 2.5
content-foreground = ${colors.background}
content-background = ${colors.tertiary}

[module/xworkspaces]
type = internal/xworkspaces
label-active = ůįĄģ %name%
label-active-background = ${colors.background}
label-active-foreground = ${colors.primary}
label-active-padding = 1
label-empty = ůįĄĪ %name%
label-empty-background = ${colors.background}
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1
label-occupied = ůįĄĪ %name%
label-occupied-background = ${colors.background}
label-occupied-padding = 1
label-urgent = ůįĄĪ %name%
label-urgent-background = ${colors.background}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:‚Ä¶%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = Porn folder: %{F#449dab}%mountpoint%%{F-} %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "ůįĚü MUTED"
label-muted-foreground = ${colors.alert}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock      

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "Ô°ö "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 5
format-prefix = "ůįĽ† "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#9ece6a}%ifname%%{F#9ece6a} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
interface = wlp0s20f3
format-prefix = "Ôáę "
label-connected = Ôáę  %{F#449dab}%local_ip%%{F-}

[module/battery]
type = internal/battery
adapter = ADP1
battery = BAT0
full-at = 100
low-at = 5
poll-interval = 5
label-charging = Battery (plugged in): %percentage%%
label-discharging = Battery (discharging): %percentage%%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

format-prefix = "ůį•Ē  "
label = %date%
label-foreground = ${colors.secondary}

[module/previous]
type = custom/ipc
format-font = 2
; Default
hook-0 = echo ""
; When spotify active
hook-1 = echo "ůįíģ"
click-left = "spotifyctl -q previous"

[module/next]
type = custom/ipc
format-font = 2
; Default
hook-0 = echo ""
; When spotify active
hook-1 = echo "ůįí≠"
click-left = "spotifyctl -q next"

[module/playpause]
type = custom/ipc
format-font = 2
; Default
hook-0 = echo ""
; Playing
hook-1 = echo "ůįŹ§"
; Paused
hook-2 = echo "Ô§Č"
click-left = "spotifyctl -q playpause"

[module/spotify]
type = custom/ipc
; Default
hook-0 = echo "Spotify not running right now"
; Playing/paused show song name and artist
hook-1 = spotifyctl -q status --format 'ůįďá  %title%'

[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true

[settings]
screenchange-reload = true
pseudo-transparency = true

